<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pipeline Flow — Unyte</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Montserrat:wght@400;500;600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --coral:      #D96B4F;
      --slate:      #425B76;
      --slate-deep: #1E2D3D;
      --green:      #3DAA6E;
      --red:        #C0392B;
      --text-dark:  #1E2A35;
      --text-mid:   #4A5A6A;
      --text-light: #7A8FA0;
      --border:     #DDE3E9;
      --bg:         #F2F5F8;
      --white:      #FFFFFF;
    }

    /* Fill the iframe completely */
    html, body, #root { height: 100%; }
    body { font-family: 'Lato', sans-serif; color: var(--text-dark); background: var(--bg); overflow: hidden; }

    .app { display: flex; flex-direction: column; height: 100%; padding: 12px; gap: 12px; }

    /* Toolbar */
    .toolbar {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap; flex-shrink: 0;
      background: var(--white); border: 1px solid var(--border);
      border-radius: 10px; padding: 8px 14px;
    }
    .toolbar-label {
      font-size: 11px; font-weight: 700; color: var(--text-light);
      text-transform: uppercase; letter-spacing: .5px; white-space: nowrap;
      font-family: 'Montserrat', sans-serif;
    }
    .toolbar-sep { width: 1px; height: 22px; background: var(--border); }
    .range-pills { display: flex; gap: 3px; }
    .range-pill {
      padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600;
      font-family: 'Montserrat', sans-serif; cursor: pointer;
      border: 1px solid var(--border); background: var(--white); color: var(--text-mid); transition: all .15s;
    }
    .range-pill:hover { border-color: var(--slate); color: var(--slate); }
    .range-pill.active { background: var(--slate-deep); border-color: var(--slate-deep); color: #fff; }
    .date-inputs { display: flex; align-items: center; gap: 5px; }
    .date-input { padding: 3px 7px; border: 1px solid var(--border); border-radius: 6px; font-size: 11px; outline: none; }
    .date-input:focus { border-color: var(--slate); }
    .date-sep { font-size: 11px; color: var(--text-light); }

    /* Owner filter */
    .owner-filter { position: relative; }
    .owner-btn {
      display: flex; align-items: center; gap: 5px; padding: 4px 9px;
      border: 1px solid var(--border); border-radius: 8px; background: var(--white);
      font-size: 11px; font-weight: 600; font-family: 'Montserrat', sans-serif;
      cursor: pointer; color: var(--text-mid); white-space: nowrap;
    }
    .owner-btn.has-filter { border-color: var(--slate); color: var(--slate); background: #EEF2F7; }
    .owner-dropdown {
      position: absolute; top: calc(100% + 4px); left: 0;
      background: var(--white); border: 1px solid var(--border);
      border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,.12);
      padding: 6px; min-width: 190px; z-index: 100; max-height: 240px; overflow-y: auto;
    }
    .owner-option { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 6px; cursor: pointer; font-size: 12px; }
    .owner-option:hover { background: var(--bg); }
    .owner-option input[type="checkbox"] { accent-color: var(--slate); }
    .owner-clear { font-size: 11px; color: var(--coral); cursor: pointer; padding: 4px 8px; font-weight: 600; }
    .owner-clear:hover { text-decoration: underline; }

    /* Chart fills remaining space */
    .chart-card {
      flex: 1; min-height: 0;
      background: var(--white); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px 18px;
      display: flex; flex-direction: column;
    }
    .chart-title-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-shrink: 0; }
    .chart-title { font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 700; color: var(--text-dark); }
    .chart-subtitle { font-size: 11px; color: var(--text-light); margin-left: 4px; }
    .chart-canvas-wrap { flex: 1; min-height: 0; position: relative; }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.45);
      display: flex; align-items: center; justify-content: center; z-index: 400; padding: 16px;
    }
    .modal {
      background: var(--white); border-radius: 12px; width: 100%; max-width: 680px;
      max-height: 82vh; display: flex; flex-direction: column;
      box-shadow: 0 16px 48px rgba(0,0,0,.25);
    }
    .modal-header {
      padding: 16px 20px 12px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
    }
    .modal-title { font-family: 'Montserrat', sans-serif; font-size: 14px; font-weight: 700; color: var(--text-dark); }
    .modal-subtitle { font-size: 12px; color: var(--text-light); margin-top: 2px; }
    .modal-close { background: none; border: none; cursor: pointer; font-size: 20px; color: var(--text-light); padding: 4px; border-radius: 4px; }
    .modal-close:hover { background: var(--bg); }
    .modal-search-wrap { padding: 8px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .modal-search-input {
      width: 100%; padding: 6px 11px; border: 1px solid var(--border); border-radius: 7px;
      font-size: 13px; font-family: 'Lato', sans-serif; outline: none; background: var(--bg);
    }
    .modal-search-input:focus { border-color: var(--slate); background: var(--white); }
    .modal-search-count { font-size: 11px; color: var(--text-light); margin-top: 3px; }
    .modal-body { overflow-y: auto; flex: 1; }
    .modal-deal { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; border-bottom: 1px solid var(--border); gap: 12px; }
    .modal-deal:last-child { border-bottom: none; }
    .modal-deal-name {
      font-size: 13px; color: #C05A3A; text-decoration: underline;
      text-decoration-color: rgba(192,90,58,.4); text-underline-offset: 2px;
      font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block;
    }
    .modal-deal-name:hover { color: var(--coral); text-decoration-color: var(--coral); }
    .modal-deal-meta { display: flex; gap: 12px; font-size: 11px; color: var(--text-light); margin-top: 2px; font-family: 'Montserrat', sans-serif; flex-wrap: wrap; }
    .modal-deal-amount { font-size: 13px; font-weight: 700; color: var(--text-dark); flex-shrink: 0; }
    .modal-empty { padding: 28px; text-align: center; color: var(--text-light); font-size: 13px; }

    /* Spinner */
    .spinner { width: 26px; height: 26px; border: 3px solid var(--border); border-top-color: var(--slate); border-radius: 50%; animation: spin .7s linear infinite; margin: 40px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

const C = { slate:'#425B76', deep:'#1E2D3D', coral:'#D96B4F', green:'#3DAA6E', red:'#C0392B' };
const CHART_DEFAULTS = { font:{family:"'Lato',sans-serif",size:11}, color:'#7A8FA0', border:'#DDE3E9' };
const FLOW_MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const BUCKET_DEFS = [
  { key:'added',      dealsKey:'addedDeals',      label:'Added',       color:C.slate },
  { key:'closedWon',  dealsKey:'closedWonDeals',  label:'Won',         color:C.green },
  { key:'closedLost', dealsKey:'closedLostDeals', label:'Lost',        color:C.red   },
  { key:'openAtEnd',  dealsKey:'openAtEndDeals',  label:'Open at End', color:C.coral },
];

function hexAlpha(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function fmt$(n){if(!n&&n!==0)return'—';const abs=Math.abs(n),sign=n<0?'-':'';if(abs>=1e6)return`${sign}$${(abs/1e6).toFixed(1)}M`;if(abs>=1e3)return`${sign}$${(abs/1e3).toFixed(0)}K`;return`${sign}$${abs.toLocaleString()}`;}
function fmtFull$(n){if(!n&&n!==0)return'—';return(n<0?'-$':'$')+Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});}
function fmtMonth(d){return d.toLocaleDateString('en-US',{month:'short',year:'2-digit'});}
function fmtDate(iso){if(!iso)return'—';return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}

function computeMonthlyData(deals,pipeline,selectedOwners,dateRange,customStart,customEnd){
  if(!deals?.length||!pipeline)return[];
  const filtered=selectedOwners.size===0?deals:deals.filter(d=>selectedOwners.has(d.ownerId));
  if(!filtered.length)return[];
  const now=new Date();let rangeStart,rangeEnd=now;
  switch(dateRange){
    case'3m':rangeStart=new Date(now.getFullYear(),now.getMonth()-2,1);break;
    case'6m':rangeStart=new Date(now.getFullYear(),now.getMonth()-5,1);break;
    case'12m':rangeStart=new Date(now.getFullYear(),now.getMonth()-11,1);break;
    case'ytd':rangeStart=new Date(now.getFullYear(),0,1);break;
    case'custom':rangeStart=customStart?new Date(customStart):new Date(now.getFullYear(),0,1);rangeEnd=customEnd?new Date(customEnd):now;break;
    default:{const earliest=filtered.reduce((min,d)=>{const t=new Date(d.createdate).getTime();return t<min?t:min;},Date.now());const e=new Date(earliest);rangeStart=new Date(e.getFullYear(),e.getMonth(),1);}
  }
  const months=[];let cur=new Date(rangeStart.getFullYear(),rangeStart.getMonth(),1);
  const endCap=new Date(rangeEnd.getFullYear(),rangeEnd.getMonth(),1);
  while(cur<=endCap){months.push(new Date(cur));cur=new Date(cur.getFullYear(),cur.getMonth()+1,1);}
  return months.map(monthStart=>{
    const monthEnd=new Date(monthStart.getFullYear(),monthStart.getMonth()+1,0,23,59,59,999);
    const msEnd=monthEnd.getTime(),msStart=monthStart.getTime();
    let added=0,addedCount=0,addedDeals=[],closedWon=0,closedWonCount=0,closedWonDeals=[],closedLost=0,closedLostCount=0,closedLostDeals=[],openAtEnd=0,openAtEndCount=0,openAtEndDeals=[];
    for(const deal of filtered){
      const amount=deal.amount||0,createTs=new Date(deal.createdate).getTime();
      const cwTs=deal.closedWonDate?new Date(deal.closedWonDate).getTime():null;
      const clTs=deal.closedLostDate?new Date(deal.closedLostDate).getTime():null;
      const closedate=deal.closedate||deal.closedWonDate||deal.closedLostDate||null;
      const ref={id:deal.id,name:deal.name,amount,stageId:deal.currentStage,ownerId:deal.ownerId,closedate};
      if(createTs>=msStart&&createTs<=msEnd){added+=amount;addedCount++;addedDeals.push(ref);}
      if(cwTs&&cwTs>=msStart&&cwTs<=msEnd){closedWon+=amount;closedWonCount++;closedWonDeals.push(ref);}
      if(clTs&&clTs>=msStart&&clTs<=msEnd){closedLost+=amount;closedLostCount++;closedLostDeals.push(ref);}
      if(createTs<=msEnd){const isOpen=(!cwTs||cwTs>msEnd)&&(!clTs||clTs>msEnd);if(isOpen){openAtEnd+=amount;openAtEndCount++;openAtEndDeals.push(ref);}}
    }
    return{month:monthStart,label:fmtMonth(monthStart),added,addedCount,addedDeals,closedWon,closedWonCount,closedWonDeals,closedLost,closedLostCount,closedLostDeals,openAtEnd,openAtEndCount,openAtEndDeals};
  });
}

// ── Deal Modal ────────────────────────────────────────────────────────────────
function DrillDownModal({title,deals,portalId,owners,pipeline,onClose}){
  const [search,setSearch]=useState('');
  useEffect(()=>{const h=e=>{if(e.key==='Escape')onClose();};document.addEventListener('keydown',h);return()=>document.removeEventListener('keydown',h);},[]);
  const stageMap=useMemo(()=>{const m={};(pipeline?.stages||[]).forEach(s=>{m[s.id]=s.label;});return m;},[pipeline]);
  const sorted=[...deals].sort((a,b)=>(b.amount||0)-(a.amount||0));
  const q=search.trim().toLowerCase();
  const filtered=q?sorted.filter(d=>{const o=(d.ownerId&&owners?.[d.ownerId])||{};return d.name.toLowerCase().includes(q)||(o.firstName||'').toLowerCase().includes(q)||(o.lastName||'').toLowerCase().includes(q);}):sorted;
  const total=deals.reduce((s,d)=>s+(d.amount||0),0);
  const hsUrl=id=>portalId?`https://app.hubspot.com/contacts/${portalId}/record/0-3/${id}`:`https://app.hubspot.com/contacts/record/0-3/${id}`;
  function exportCSV(){
    const rows=[['Deal Name','Owner','Close Date','Stage','Amount']];
    filtered.forEach(d=>{const owner=(d.ownerId&&owners?.[d.ownerId]?.name)||'Unassigned';const stage=stageMap[d.stageId]||'—';const date=d.closedate?new Date(d.closedate).toLocaleDateString('en-US'):'—';rows.push([`"${(d.name||'').replace(/"/g,'""')}"`,owner,date,stage,d.amount||0]);});
    const csv=rows.map(r=>r.join(',')).join('\n');const blob=new Blob([csv],{type:'text/csv'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`deals-${new Date().toISOString().slice(0,10)}.csv`;a.click();URL.revokeObjectURL(url);
  }
  return(
    <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal">
        <div className="modal-header">
          <div>
            <div className="modal-title">{title}</div>
            <div className="modal-subtitle">{deals.length} deal{deals.length!==1?'s':''} · {fmtFull$(total)}</div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <button onClick={exportCSV} style={{fontSize:11,padding:'4px 10px',border:'1px solid var(--border)',borderRadius:7,background:'var(--white)',cursor:'pointer',fontFamily:"'Montserrat',sans-serif",fontWeight:600,color:'var(--slate)'}}>↓ CSV</button>
            <button className="modal-close" onClick={onClose}>×</button>
          </div>
        </div>
        <div className="modal-search-wrap">
          <input className="modal-search-input" type="text" placeholder="Search deals…" value={search} onChange={e=>setSearch(e.target.value)} autoFocus />
          {q&&<div className="modal-search-count">{filtered.length} of {deals.length} deals</div>}
        </div>
        <div className="modal-body">
          {filtered.length===0&&<div className="modal-empty">No deals match</div>}
          {filtered.map(d=>{
            const ownerName=(d.ownerId&&owners?.[d.ownerId]?.name)||'Unassigned';
            const stageName=stageMap[d.stageId]||'—';
            return(
              <div key={d.id} className="modal-deal">
                <div style={{flex:1,minWidth:0}}>
                  <a href={hsUrl(d.id)} target="_blank" rel="noopener noreferrer" className="modal-deal-name" title={d.name}>
                    {d.name}<sup style={{fontSize:'0.6em',marginLeft:3,opacity:.75}}>↗</sup>
                  </a>
                  <div className="modal-deal-meta">
                    <span>👤 {ownerName}</span>
                    <span>📅 {fmtDate(d.closedate)}</span>
                    <span>{stageName}</span>
                  </div>
                </div>
                <span className="modal-deal-amount">{fmtFull$(d.amount)}</span>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ── Owner Filter ──────────────────────────────────────────────────────────────
function OwnerFilter({owners,deals,selectedOwners,onChange}){
  const [open,setOpen]=useState(false);const ref=useRef(null);
  useEffect(()=>{const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};document.addEventListener('mousedown',h);return()=>document.removeEventListener('mousedown',h);},[]);
  const pipelineOwnerIds=useMemo(()=>{const ids=new Set();for(const d of deals||[]){if(d.ownerId)ids.add(d.ownerId);}return ids;},[deals]);
  const ownerList=Object.values(owners||{}).filter(o=>pipelineOwnerIds.has(o.id)).sort((a,b)=>a.name.localeCompare(b.name));
  const hasFilter=selectedOwners.size>0;
  const label=hasFilter?selectedOwners.size===1?(ownerList.find(o=>selectedOwners.has(o.id))?.name||'Owner'):`${selectedOwners.size} owners`:'All owners';
  function toggle(id){const next=new Set(selectedOwners);next.has(id)?next.delete(id):next.add(id);onChange(next);}
  return(
    <div className="owner-filter" ref={ref}>
      <button className={`owner-btn${hasFilter?' has-filter':''}`} onClick={()=>setOpen(v=>!v)}>
        <span>👤</span><span>{label}</span><span style={{opacity:.5}}>▾</span>
      </button>
      {open&&(
        <div className="owner-dropdown">
          {hasFilter&&<div className="owner-clear" onClick={()=>onChange(new Set())}>Clear filter</div>}
          {ownerList.map(o=>(<label key={o.id} className="owner-option"><input type="checkbox" checked={selectedOwners.has(o.id)} onChange={()=>toggle(o.id)}/><span>{o.name}</span></label>))}
        </div>
      )}
    </div>
  );
}

// ── Chart ─────────────────────────────────────────────────────────────────────
function PipelineFlowChart({rows,yoyRows,openModal}){
  const [viewMode,setViewMode]=useState('timeline');
  const [hiddenBuckets,setHiddenBuckets]=useState(new Set());
  const canvasRef=useRef(null);const chartRef=useRef(null);
  function toggleBucket(idx){setHiddenBuckets(prev=>{const next=new Set(prev);next.has(idx)?next.delete(idx):next.add(idx);return next;});}
  const yoyData=useMemo(()=>{const source=yoyRows||rows;const byYear={};for(const row of source){const yr=row.month.getFullYear(),mo=row.month.getMonth();if(!byYear[yr])byYear[yr]={};byYear[yr][mo]=row;}return{byYear,years:Object.keys(byYear).map(Number).sort()};},[yoyRows,rows]);

  useEffect(()=>{
    if(!canvasRef.current||!rows.length)return;
    if(chartRef.current)chartRef.current.destroy();
    if(viewMode==='timeline'){
      chartRef.current=new Chart(canvasRef.current,{
        type:'bar',
        data:{labels:rows.map(r=>r.label),datasets:BUCKET_DEFS.map(b=>({label:b.label,data:rows.map(r=>r[b.key]),backgroundColor:b.color,borderRadius:3}))},
        options:{
          responsive:true,maintainAspectRatio:false,
          onHover:(e,els)=>{e.native.target.style.cursor=els.length?'pointer':'default';},
          onClick:(e,els)=>{
            if(!els.length)return;
            const{datasetIndex,index}=els[0];
            const row=rows[index];if(!row)return;
            const b=BUCKET_DEFS[datasetIndex];
            const deals=row[b.dealsKey]||[];if(!deals.length)return;
            openModal(`${b.label} — ${row.label}`,deals);
          },
          plugins:{legend:{labels:{font:CHART_DEFAULTS.font,color:CHART_DEFAULTS.color,boxWidth:12}},tooltip:{callbacks:{label:ctx=>` ${ctx.dataset.label}: ${fmtFull$(ctx.raw)}`}}},
          scales:{x:{grid:{color:CHART_DEFAULTS.border},ticks:{font:CHART_DEFAULTS.font,color:CHART_DEFAULTS.color}},y:{grid:{color:CHART_DEFAULTS.border},ticks:{font:CHART_DEFAULTS.font,color:CHART_DEFAULTS.color,callback:v=>fmt$(v)}}},
        },
      });
    } else {
      const{byYear,years}=yoyData;const datasets=[];
      years.forEach((year,yi)=>{
        const alpha=years.length===1?1:0.35+(yi/(years.length-1))*0.65;
        BUCKET_DEFS.forEach((b,bi)=>{
          if(hiddenBuckets.has(bi))return;
          datasets.push({label:`_${b.label} ${year}`,data:FLOW_MONTHS.map((_,mi)=>byYear[year]?.[mi]?.[b.key]||0),backgroundColor:hexAlpha(b.color,alpha),stack:String(year),borderRadius:2,_year:year,_bucketIdx:bi});
        });
      });
      const yoyYearLabelPlugin={
        id:'yoyYearLabels',
        afterDraw(chart){
          const{years:yrs}=chart.config.options.plugins?.yoyYearLabels||{};
          if(!yrs?.length)return;
          const ctx=chart.ctx;ctx.save();
          ctx.font="bold 9px 'Lato', sans-serif";ctx.textAlign='center';ctx.textBaseline='top';
          const numPts=chart.data.labels.length;
          const yearDsMap={};
          chart.data.datasets.forEach((ds,i)=>{if(ds._year!==undefined&&yearDsMap[ds._year]===undefined)yearDsMap[ds._year]=i;});
          yrs.forEach((year,yi)=>{
            const di=yearDsMap[year];if(di===undefined)return;
            const meta=chart.getDatasetMeta(di);
            const a=yrs.length===1?1:0.4+(yi/(yrs.length-1))*0.6;
            ctx.fillStyle=`rgba(66,91,118,${a})`;
            for(let mi=0;mi<numPts;mi++){const bar=meta.data[mi];if(!bar)continue;ctx.fillText(`'${String(year).slice(2)}`,bar.x,chart.scales.x.bottom+4);}
          });
          ctx.restore();
        },
      };
      chartRef.current=new Chart(canvasRef.current,{
        type:'bar',data:{labels:FLOW_MONTHS,datasets},
        plugins:[yoyYearLabelPlugin],
        options:{
          responsive:true,maintainAspectRatio:false,
          layout:{padding:{bottom:18}},
          onHover:(e,els)=>{e.native.target.style.cursor=els.length?'pointer':'default';},
          onClick:(e,els)=>{
            if(!els.length)return;
            const{datasetIndex,index}=els[0];
            const ds=chartRef.current.data.datasets[datasetIndex];
            const row=yoyData.byYear[ds._year]?.[index];if(!row)return;
            const b=BUCKET_DEFS[ds._bucketIdx];
            const deals=row[b.dealsKey]||[];if(!deals.length)return;
            openModal(`${b.label} — ${FLOW_MONTHS[index]} ${ds._year}`,deals);
          },
          plugins:{
            legend:{display:false},
            yoyYearLabels:{years},
            tooltip:{callbacks:{title:items=>`${FLOW_MONTHS[items[0].dataIndex]}`,label:ctx=>{if(!ctx.raw)return null;return ` ${BUCKET_DEFS[ctx.dataset._bucketIdx].label} ${ctx.dataset._year}: ${fmtFull$(ctx.raw)}`;}}},
          },
          scales:{x:{stacked:true,grid:{color:CHART_DEFAULTS.border},ticks:{font:CHART_DEFAULTS.font,color:CHART_DEFAULTS.color}},y:{stacked:true,grid:{color:CHART_DEFAULTS.border},ticks:{font:CHART_DEFAULTS.font,color:CHART_DEFAULTS.color,callback:v=>fmt$(v)}}},
        },
      });
    }
    return()=>{if(chartRef.current){chartRef.current.destroy();chartRef.current=null;}};
  },[rows,yoyRows,viewMode,hiddenBuckets]);

  return(
    <div className="chart-card">
      <div className="chart-title-row">
        <span className="chart-title">Monthly Pipeline Flow</span>
        <span className="chart-subtitle">{viewMode==='yoy'?'Year-over-year':'Added / Won / Lost / Open'}</span>
        <div style={{marginLeft:'auto',display:'flex',gap:3}}>
          <button className={`range-pill${viewMode==='timeline'?' active':''}`} style={{fontSize:10,padding:'2px 8px'}} onClick={()=>setViewMode('timeline')}>Timeline</button>
          <button className={`range-pill${viewMode==='yoy'?' active':''}`} style={{fontSize:10,padding:'2px 8px'}} onClick={()=>setViewMode('yoy')}>YoY</button>
        </div>
      </div>
      {viewMode==='yoy'&&(
        <div style={{display:'flex',gap:16,flexWrap:'wrap',marginBottom:8,alignItems:'flex-start'}}>
          <div style={{display:'flex',gap:10,flexWrap:'wrap',alignItems:'center'}}>
            <span style={{fontSize:10,fontWeight:700,color:'var(--text-light)',textTransform:'uppercase',letterSpacing:'.5px',fontFamily:"'Montserrat',sans-serif"}}>Metric</span>
            {BUCKET_DEFS.map((b,i)=>(
              <div key={i} onClick={()=>toggleBucket(i)} style={{display:'flex',alignItems:'center',gap:4,cursor:'pointer',opacity:hiddenBuckets.has(i)?0.3:1,transition:'opacity .15s',userSelect:'none'}}>
                <div style={{width:10,height:10,borderRadius:2,background:b.color,flexShrink:0}}/>
                <span style={{fontSize:11,color:'var(--text-light)',fontFamily:"'Lato',sans-serif"}}>{b.label}</span>
              </div>
            ))}
          </div>
          <div style={{width:1,height:18,background:'var(--border)',alignSelf:'center'}}/>
          <div style={{display:'flex',gap:10,flexWrap:'wrap',alignItems:'center'}}>
            <span style={{fontSize:10,fontWeight:700,color:'var(--text-light)',textTransform:'uppercase',letterSpacing:'.5px',fontFamily:"'Montserrat',sans-serif"}}>Year</span>
            {yoyData.years.map((year,yi)=>{
              const alpha=yoyData.years.length===1?1:0.35+(yi/(yoyData.years.length-1))*0.65;
              return(
                <div key={year} style={{display:'flex',alignItems:'center',gap:4}}>
                  <div style={{width:10,height:10,borderRadius:2,background:`rgba(66,91,118,${alpha})`,flexShrink:0}}/>
                  <span style={{fontSize:11,color:'var(--text-light)',fontFamily:"'Lato',sans-serif"}}>{year}</span>
                </div>
              );
            })}
          </div>
        </div>
      )}
      <div className="chart-canvas-wrap"><canvas ref={canvasRef}/></div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const [data,setData]=useState(null);const [loading,setLoading]=useState(true);
  const [dateRange,setDateRange]=useState('all');const [customStart,setCustomStart]=useState('');const [customEnd,setCustomEnd]=useState('');
  const [selectedOwners,setSelectedOwners]=useState(new Set());
  const [modal,setModal]=useState(null);

  useEffect(()=>{fetch('/api/embed-data').then(r=>r.json()).then(d=>{if(d.deals?.length)setData(d);}).finally(()=>setLoading(false));},[]);

  const rows=useMemo(()=>computeMonthlyData(data?.deals,data?.pipeline,selectedOwners,dateRange,customStart,customEnd),[data,selectedOwners,dateRange,customStart,customEnd]);
  const allTimeRows=useMemo(()=>computeMonthlyData(data?.deals,data?.pipeline,selectedOwners,'all','',''),[data,selectedOwners]);

  function openModal(title,deals){if(deals?.length)setModal({title,deals});}

  const DATE_RANGES=[{key:'all',label:'All Time'},{key:'ytd',label:'YTD'},{key:'12m',label:'12M'},{key:'6m',label:'6M'},{key:'3m',label:'3M'},{key:'custom',label:'Custom'}];

  return(
    <div className="app">
      {/* Toolbar */}
      <div className="toolbar">
        <span className="toolbar-label">Range</span>
        <div className="range-pills">
          {DATE_RANGES.map(r=>(<button key={r.key} className={`range-pill${dateRange===r.key?' active':''}`} onClick={()=>setDateRange(r.key)}>{r.label}</button>))}
        </div>
        {dateRange==='custom'&&(
          <div className="date-inputs">
            <input type="date" className="date-input" value={customStart} onChange={e=>setCustomStart(e.target.value)}/>
            <span className="date-sep">→</span>
            <input type="date" className="date-input" value={customEnd} onChange={e=>setCustomEnd(e.target.value)}/>
          </div>
        )}
        <div className="toolbar-sep"/>
        <span className="toolbar-label">Owner</span>
        <OwnerFilter owners={data?.owners||{}} deals={data?.deals||[]} selectedOwners={selectedOwners} onChange={setSelectedOwners}/>
      </div>

      {/* Chart */}
      {loading&&<div className="spinner"/>}
      {!loading&&rows.length>0&&<PipelineFlowChart rows={rows} yoyRows={allTimeRows} openModal={openModal}/>}
      {!loading&&!data?.deals?.length&&<div style={{textAlign:'center',padding:40,color:'#7A8FA0',fontSize:13}}>No data — run a Full Refresh in the main dashboard first.</div>}

      {/* Modal */}
      {modal&&<DrillDownModal title={modal.title} deals={modal.deals} portalId={data?.portalId} owners={data?.owners} pipeline={data?.pipeline} onClose={()=>setModal(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
